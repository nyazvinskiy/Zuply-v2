<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuply - Настройка Telegram</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #0a0a0c;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-weight: 600; font-size: 28px; margin-bottom: 8px; }
        p { color: #888; margin-bottom: 30px; font-weight: 300; }
        .user-list {
            text-align: left;
            margin-bottom: 30px;
            max-height: 300px;
            overflow-y: auto;
        }
        .user-item {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .user-item:hover { border-color: var(--primary); background: rgba(0, 122, 255, 0.05); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: 600; font-size: 16px; }
        .user-id { font-size: 12px; color: #666; font-family: monospace; }
        .checkbox { cursor: pointer; width: 20px; height: 20px; accent-color: var(--primary); }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover { background: #0066d6; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { background: #333; cursor: not-allowed; }
        .status { margin-top: 20px; font-size: 14px; min-height: 20px; }
        .loader {
            border: 2px solid #333;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Настройка Telegram</h1>
        <p>1. Отправьте <b>/start</b> боту в Telegram.<br>2. Нажмите кнопку ниже для поиска.</p>
        
        <div id="userList" class="user-list">
            <!-- Users will appear here -->
        </div>

        <button id="refreshBtn" class="btn">Искать новых пользователей</button>
        <button id="saveBtn" class="btn" style="margin-top: 10px; display: none;">Сохранить выбранных как админов</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const BOT_TOKEN = '8690599672:AAHSjFI50OLXxSnYv7cuAPyN5HDYM2Qi_qw';
        const userListDiv = document.getElementById('userList');
        const refreshBtn = document.getElementById('refreshBtn');
        const saveBtn = document.getElementById('saveBtn');
        const statusDiv = document.getElementById('status');
        
        let foundUsers = new Map();

        async function fetchUpdates() {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<span class="loader"></span>Поиск...';
            statusDiv.textContent = '';
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const data = await response.json();
                
                if (!data.ok) throw new Error(data.description);
                
                data.result.forEach(update => {
                    const from = update.message ? update.message.from : null;
                    if (from) {
                        foundUsers.set(from.id, from.first_name + (from.last_name ? ' ' + from.last_name : ''));
                    }
                });

                renderUsers();
                if (foundUsers.size > 0) {
                    saveBtn.style.display = 'block';
                    statusDiv.style.color = '#00c853';
                    statusDiv.textContent = `Найдено ${foundUsers.size} пользователей.`;
                } else {
                    statusDiv.style.color = '#ff1744';
                    statusDiv.textContent = 'Новых сообщений не найдено. Отправьте /start боту и попробуйте еще раз.';
                }
            } catch (err) {
                statusDiv.style.color = '#ff1744';
                statusDiv.textContent = 'Ошибка: ' + err.message;
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Искать новых пользователей';
            }
        }

        function renderUsers() {
            userListDiv.innerHTML = '';
            foundUsers.forEach((name, id) => {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">${name}</span>
                        <span class="user-id">ID: ${id}</span>
                    </div>
                    <input type="checkbox" class="checkbox" value="${id}" checked>
                `;
                userListDiv.appendChild(item);
            });
        }

        async function saveAdmins() {
            const selectedIds = Array.from(document.querySelectorAll('.checkbox:checked')).map(cb => cb.value);
            if (selectedIds.length === 0) {
                alert('Выберите хотя бы одного пользователя.');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = 'Сохранение...';
            
            try {
                const response = await fetch('http://localhost:8000/set-ids', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: selectedIds.join(',') })
                });
                
                if (response.ok) {
                    statusDiv.style.color = '#00c853';
                    statusDiv.textContent = 'Конфигурация успешно обновлена! ✓';
                    setTimeout(() => {
                        window.close();
                    }, 2000);
                } else {
                    throw new Error('Не удалось связаться с локальным бэкендом. Убедитесь, что python backend.py запущен.');
                }
            } catch (err) {
                statusDiv.style.color = '#ff1744';
                statusDiv.textContent = 'Ошибка: ' + err.message;
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Сохранить выбранных как админов';
            }
        }

        refreshBtn.addEventListener('click', fetchUpdates);
        saveBtn.addEventListener('click', saveAdmins);
    </script>
</body>
</html>
