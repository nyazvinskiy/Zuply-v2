<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: white;
  }
  .logo-wrap {
    display: flex; align-items: center; gap: 0;
    position: relative;
  }
  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 120px;
    letter-spacing: -5px;
    color: #0A0A0F;
    line-height: 1;
    position: relative;
  }
  .logo-dot {
    width: 14px; height: 14px;
    background: linear-gradient(135deg, #0066FF, #0052CC);
    border-radius: 50%;
    position: absolute;
    top: 6px; right: -8px;
  }

  /* Dark version */
  .dark-bg {
    background: #0A0A0F;
    padding: 80px 120px;
    border-radius: 24px;
    margin-top: 80px;
  }
  .dark-bg .logo-text { color: #FFFFFF; }

  .container {
    display: flex; flex-direction: column; align-items: center; gap: 40px;
    padding: 60px;
  }

  .label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; color: #999; text-transform: uppercase;
    letter-spacing: 3px; margin-bottom: 20px;
  }

  /* Navbar-size version */
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    margin-top: 60px;
  }
  .nav-logo .logo-text {
    font-size: 28px; letter-spacing: -1.5px;
  }
  .nav-logo .logo-dot {
    width: 5px; height: 5px; top: 1px; right: -3px;
  }
</style>
</head>
<body>
<div class="container">
  <div>
    <div class="label">Light Version</div>
    <div class="logo-wrap">
      <span class="logo-text">Zuply<span class="logo-dot"></span></span>
    </div>
  </div>

  <div class="dark-bg">
    <div class="label" style="color:#555">Dark Version</div>
    <div class="logo-wrap">
      <span class="logo-text" style="color:#fff">Zuply<span class="logo-dot"></span></span>
    </div>
  </div>

  <div>
    <div class="label">Navbar Size</div>
    <div class="nav-logo">
      <span class="logo-text">Zuply<span class="logo-dot"></span></span>
    </div>
  </div>
</div>
</body>
</html>
